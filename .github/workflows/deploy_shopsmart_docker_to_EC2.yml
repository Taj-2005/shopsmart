name: Deploy ShopSmart Server (Docker) to EC2

on:
  workflow_dispatch:
    inputs:
      image:
        description: "Docker image to run (Docker Hub or full registry path)"
        required: true
        default: "tajuddinshaik/shopsmart-server:distroless"
      host_port:
        description: "Host port exposed on EC2 (maps to container port 4000)"
        required: true
        default: "4000"

jobs:
  deploy-docker:
    runs-on: ubuntu-latest
    steps:
      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/ec2_key.pem
          chmod 600 ~/.ssh/ec2_key.pem

      - name: Copy env and run container on EC2
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER || 'ubuntu' }}
          SHOPSMART_SERVER_ENV: ${{ secrets.SHOPSMART_SERVER_ENV }}
          DOCKER_IMAGE: ${{ inputs.image }}
          HOST_PORT: ${{ inputs.host_port }}
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          if [ -z "${SHOPSMART_SERVER_ENV:-}" ]; then
            echo "[ERROR] Missing secret SHOPSMART_SERVER_ENV (full server .env contents)."
            exit 1
          fi
          if [ -z "${EC2_HOST:-}" ]; then
            echo "[ERROR] Missing secret EC2_HOST."
            exit 1
          fi

          ssh -o StrictHostKeyChecking=no -i ~/.ssh/ec2_key.pem \
            "$EC2_USER@$EC2_HOST" \
            "rm -f /tmp/dhub_pass"

          printf "%s" "$SHOPSMART_SERVER_ENV" > /tmp/shopsmart-server.env
          scp -o StrictHostKeyChecking=no -i ~/.ssh/ec2_key.pem /tmp/shopsmart-server.env \
            "$EC2_USER@$EC2_HOST:/tmp/shopsmart-server.env"

          if [ -n "${DOCKERHUB_USERNAME:-}" ] && [ -n "${DOCKERHUB_TOKEN:-}" ]; then
            printf '%s' "$DOCKERHUB_TOKEN" > /tmp/dhub_pass
            scp -o StrictHostKeyChecking=no -i ~/.ssh/ec2_key.pem /tmp/dhub_pass \
              "$EC2_USER@$EC2_HOST:/tmp/dhub_pass"
            rm -f /tmp/dhub_pass
          fi

          IMG_Q=$(printf '%q' "$DOCKER_IMAGE")
          PORT_Q=$(printf '%q' "$HOST_PORT")
          USER_Q=$(printf '%q' "${DOCKERHUB_USERNAME:-}")

          {
            echo 'set -euo pipefail'
            echo 'CONTAINER_NAME="shopsmart-api-docker"'
            echo 'IMAGE="${IMAGE:?Set IMAGE (docker image ref)}"'
            echo 'HOST_PORT="${HOST_PORT:?Set HOST_PORT}"'
            echo 'if ! command -v docker >/dev/null 2>&1; then'
            echo '  sudo apt-get update -y'
            echo '  sudo apt-get install -y docker.io'
            echo '  sudo systemctl enable --now docker'
            echo 'fi'
            echo 'if [ -f /tmp/dhub_pass ]; then'
            echo '  chmod 600 /tmp/dhub_pass'
            echo '  : "${DOCKERHUB_USERNAME:?Set DOCKERHUB_USERNAME when using /tmp/dhub_pass}"'
            echo '  sudo docker login -u "$DOCKERHUB_USERNAME" --password-stdin < /tmp/dhub_pass'
            echo '  rm -f /tmp/dhub_pass'
            echo 'fi'
            echo 'sudo install -m 600 /tmp/shopsmart-server.env /opt/shopsmart-server.env'
            echo 'sudo docker rm -f "$CONTAINER_NAME" 2>/dev/null || true'
            echo 'if command -v pm2 >/dev/null 2>&1; then'
            echo '  pm2 stop shopsmart-api 2>/dev/null || true'
            echo 'fi'
            echo 'sudo docker pull "$IMAGE"'
            echo 'sudo docker run -d \'
            echo '  --name "$CONTAINER_NAME" \'
            echo '  --restart unless-stopped \'
            echo '  -p "${HOST_PORT}:4000" \'
            echo '  --env-file /opt/shopsmart-server.env \'
            echo '  "$IMAGE"'
            echo 'echo "[OK] Running ${IMAGE} on host port ${HOST_PORT} -> container 4000"'
            echo 'rm -f /tmp/dhub_pass'
          } | ssh -o StrictHostKeyChecking=no -i ~/.ssh/ec2_key.pem \
            "$EC2_USER@$EC2_HOST" \
            "export IMAGE=${IMG_Q} HOST_PORT=${PORT_Q} DOCKERHUB_USERNAME=${USER_Q}; bash -s"

      - name: Cleanup SSH key
        if: always()
        run: rm -f ~/.ssh/ec2_key.pem
