name: Deploy ShopSmart Client to AWS EC2

on:
  workflow_dispatch:
  pull_request:
    branches: [main, develop]
    paths:
      - "shopsmart/client/**"
      - ".github/workflows/deploy_shopsmart_client_to_EC2.yml"

concurrency:
  group: deploy-shopsmart-client
  cancel-in-progress: true

jobs:
  pr-check:
    name: PR check (client build)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: shopsmart/client
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: shopsmart/client/package-lock.json

      - name: Install dependencies
        run: npm ci --include=dev

      - name: Build client
        run: npm run build

  deploy:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/ec2_key.pem
          chmod 600 ~/.ssh/ec2_key.pem

      - name: Deploy + restart (SSH)
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER || 'ubuntu' }}
          SHOPSMART_DEPLOY_PATH: ${{ secrets.SHOPSMART_DEPLOY_PATH || '/opt/shopsmart' }}
        run: |
          DEPLOY_PATH="${SHOPSMART_DEPLOY_PATH:-/opt/shopsmart}"
          REPO_URL="https://github.com/${GITHUB_REPOSITORY}.git"
          BRANCH="${GITHUB_REF_NAME}"

          ssh -o StrictHostKeyChecking=no -i ~/.ssh/ec2_key.pem \
            "$EC2_USER@$EC2_HOST" \
            "DEPLOY_PATH='$DEPLOY_PATH' REPO_URL='$REPO_URL' BRANCH='$BRANCH' bash -s" <<'EOF'
          set -euo pipefail

          # Ensure base tools exist
          if ! command -v git >/dev/null 2>&1; then
            sudo apt-get update -y
            sudo apt-get install -y git
          fi

          # Ensure Node + npm exist (Node 20 LTS)
          if ! command -v node >/dev/null 2>&1; then
            curl -fsSL https://deb.nodesource.com/setup_20.x | sudo -E bash -
            sudo apt-get install -y nodejs
          fi

          # Ensure pm2 exists for process management (idempotent)
          if ! command -v pm2 >/dev/null 2>&1; then
            sudo npm install -g pm2
          fi

          # Ensure lsof exists to kill any process on port 3000
          if ! command -v lsof >/dev/null 2>&1; then
            sudo apt-get update -y
            sudo apt-get install -y lsof
          fi

          sudo mkdir -p "$DEPLOY_PATH"
          sudo chown -R "$USER":"$USER" "$DEPLOY_PATH"

          if [ ! -d "$DEPLOY_PATH/.git" ]; then
            git clone "$REPO_URL" "$DEPLOY_PATH"
          fi

          cd "$DEPLOY_PATH"
          git fetch --all --prune
          git checkout "$BRANCH"
          git pull --ff-only origin "$BRANCH"

          cd shopsmart/client

          # Point frontend to backend running on same EC2 host at localhost:4000
          cat > .env.local <<ENV
          NEXT_PUBLIC_API_URL=http://localhost:4000
          ENV

          npm ci --include=dev
          npm run build

          # Stop all processes currently bound to 3000 before starting frontend
          PIDS="$(lsof -ti:3000 || true)"
          if [ -n "$PIDS" ]; then
            echo "$PIDS" | xargs -r kill -9
            sleep 1
          fi

          # Start or reload frontend with pm2 on port 3000 (idempotent)
          pm2 delete shopsmart-client >/dev/null 2>&1 || true
          PORT=3000 pm2 start npm --name shopsmart-client -- start -- -p 3000 --hostname 0.0.0.0
          pm2 save

          echo "[OK] Deployed ShopSmart frontend on port 3000."
          EOF

      - name: Cleanup SSH key
        if: always()
        run: rm -f ~/.ssh/ec2_key.pem
