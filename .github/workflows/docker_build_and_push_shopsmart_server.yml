name: Docker Build and Push ShopSmart Server

on:
  workflow_dispatch:

jobs:
  docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      SHOPSMART_SERVER_ENV: ${{ secrets.SHOPSMART_SERVER_ENV }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Write server .env from secret
        run: |
          if [ -z "${SHOPSMART_SERVER_ENV:-}" ]; then
            echo "Missing secret: SHOPSMART_SERVER_ENV"
            exit 1
          fi
          printf "%s" "$SHOPSMART_SERVER_ENV" > shopsmart/server/.env

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push distroless image
        uses: docker/build-push-action@v6
        with:
          context: ./shopsmart/server
          file: ./shopsmart/server/Dockerfile.distroless
          push: true
          tags: tajuddinshaik/shopsmart-server:distroless
