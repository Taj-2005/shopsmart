services:
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: shopsmart-server
    env_file:
      - ./server/.env
    ports:
      - "4000:4000"
    restart: unless-stopped

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:4000
    container_name: shopsmart-client
    ports:
      - "3000:3000"
    depends_on:
      - server
    restart: unless-stopped
