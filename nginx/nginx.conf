events {}

http {
    # Two upstream backends — Docker DNS resolves each name to the right container
    upstream api {
        server api:8000;
    }

    upstream ui {
        server ui:8001;
    }

    server {
        listen 80;

        # /api/* → FastAPI (strips the /api prefix before forwarding)
        location /api/ {
            proxy_pass         http://api/;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
        }

        # /health → FastAPI health endpoint
        location /health {
            proxy_pass http://api/health;
        }

        # Everything else → Django UI
        # This is path-based routing: one Nginx, two backend services.
        location / {
            proxy_pass         http://ui;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
        }
    }
}
